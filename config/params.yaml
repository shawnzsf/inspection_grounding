# =============================================================================
# inspection_grounding — ROS 2 Node Parameters
# =============================================================================
# This file is passed to nodes via --params-file.  It contains ONLY node
# parameter sections (each with a ros__parameters key).
#
# Launch-level configuration (bag path, static TF) lives in launch_config.yaml.
#
# Camera intrinsics:
# - fusion_node: left camera, undistorted, full-res (3040×4032)
# - rerun_bridge:     right camera, undistorted, half-res (1520×2016)
# Source: calibration.json
# =============================================================================

# ---------------------------------------------------------------------------
# Sync Node — pairs camera images with LiDAR point clouds by timestamp
# ---------------------------------------------------------------------------
sync_node:
  ros__parameters:
    use_sim_time: true
    image_dir: /home/robot/fastlio_ws/data/2026-06-22-IWLG/frames
    camera_frame_id: camera_link
    # Undistorted intrinsics (left camera, 3040×4032 full-res)
    # fx: 597.3843593065015
    # fy: 597.4426138023167
    # cx: 774.8614840838852
    # cy: 1013.172720601387
    fx: 1190.4990185909498
    fy: 1190.344769418459
    cx: 1545.2154064008814
    cy: 1983.9367884159963

# ---------------------------------------------------------------------------
# Fusion YAML Node — segments LiDAR points using 2D bbox YAMLs
# ---------------------------------------------------------------------------
fusion_node:
  ros__parameters:
    use_sim_time: true
    yaml_dir: /home/robot/fastlio_ws/masks/Ground_Truth_20
    output_dir: /home/robot/fastlio_ws/pcd_outputs
    target_frame: camera_init
    camera_frame: camera_link
    # Scale factor for bbox coordinates if annotation resolution differs
    # from the camera intrinsics resolution.  Set to 1.0 when they match.
    bbox_scale: 1.0
    # Annotation mode: 'bbox' (per-timestamp YAML files) or 'mask' (COCO JSON)
    annotation_mode: mask
    # Path to COCO-format segmentation JSON (used when annotation_mode='mask')
    mask_json_path: /home/robot/fastlio_ws/masks/2026-6-22-IWLG/sam3_tracking_segmentation.json
    # Undistorted intrinsics (left camera, 3040×4032 half-res)
    fx: 1190.4990185909498
    fy: 1190.344769418459
    cx: 1545.2154064008814
    cy: 1983.9367884159963
    image_width: 3040
    image_height: 4032
    # Inspection database (per-observation + per-track aggregation)
    enable_db: true
    db_path: /home/robot/fastlio_ws/inspection.db
    # Max odometry entries to buffer (~30 s at 10 Hz)
    odom_buffer_size: 300

# ---------------------------------------------------------------------------
# Rerun Bridge Node — visualizes ROS 2 topics in Rerun
# ---------------------------------------------------------------------------
rerun_bridge:
  ros__parameters:
    use_sim_time: true
    # Optional visualization-only leveling rotation [roll, pitch, yaw] in degrees.
    # Does not affect actual ROS transforms or calculations.
    leveling_rpy_deg: [0.0, 20.0, 0.0]
    # Undistorted intrinsics (right camera, 1520×2016 half-res)
    fx: 597.3843593065015
    fy: 597.4426138023167
    cx: 774.8614840838852
    cy: 1013.172720601387
    image_width: 1520
    image_height: 2016
    # Enable depth image visualization (projects /cloud_registered_body
    # into the camera plane and logs a rr.DepthImage to Rerun)
    enable_depth: true
