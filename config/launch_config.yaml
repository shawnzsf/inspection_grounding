# ROS 2 bag file to play back (sqlite3 storage)
bag_path: /home/robot/fastlio_ws/rosbags/2026-06-22_17-IWLG/data/bag/bag.db3

# Static TF: body (IMU) â†’ camera_link
# Publishes T_{cameraâ†’body}: parent=body, child=camera_link
#
# From calibration.json (left camera):
#   R_lidar_camera (3Ă—3) and t_lidar_camera (lidar origin in camera frame)
# From FAST-LIO mid360.yaml (IMU extrinsic):
#   R_body_lidar = I,  t_body_lidar = [0.011, 0.02329, -0.04412]
#
# T_{bodyâ†’camera} = R_lidar_camera, t = t_lidar_camera - R_lidar_camera * t_body_lidar
# T_{cameraâ†’body} = inv(T_{bodyâ†’camera}):
#   R = R_lidar_camera^T
#   t = t_body_lidar - R_lidar_camera^T * t_lidar_camera
#     = [0.03159816, 0.06295154, -0.11131637]
# Quaternion from R_lidar_camera^T
static_tf_body_to_camera:
  translation: [0.03159816, 0.06295154, -0.11131637]       # x, y, z (metres)
  rotation_xyzw: [-0.65290271, 0.04396615, -0.27557732, 0.70416061]  # qx, qy, qz, qw
  parent_frame: body
  child_frame: camera_link
